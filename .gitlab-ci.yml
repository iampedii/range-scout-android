stages:
  - verify
  - build

workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
    - when: never

default:
  image: ghcr.io/cirruslabs/android-sdk:34
  before_script:
    - chmod +x ./gradlew
    - apt-get update
    - apt-get install -y --no-install-recommends ca-certificates curl
    - |
      if ! command -v go >/dev/null || ! go version | grep -q "go${GO_VERSION}"; then
        curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" -o /tmp/go.tgz
        rm -rf /usr/local/go
        tar -C /usr/local -xzf /tmp/go.tgz
      fi
    - export PATH="/usr/local/go/bin:${PATH}"
    - java -version
    - go version

variables:
  GO_VERSION: "1.24.1"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle-home"
  GOMODCACHE: "$CI_PROJECT_DIR/.go/pkg/mod"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g"

cache:
  key: "$CI_PROJECT_NAME"
  paths:
    - .gradle-home/caches/
    - .gradle-home/wrapper/
    - .go/pkg/mod/
    - app/build/go-build-cache/

android_unit_tests:
  stage: verify
  script:
    - ./gradlew :app:testDebugUnitTest --stacktrace
  artifacts:
    when: always
    reports:
      junit: app/build/test-results/testDebugUnitTest/*.xml
    paths:
      - app/build/reports/tests/testDebugUnitTest/
    expire_in: 14 days

dnstt_helper_tests:
  stage: verify
  script:
    - cd dnstt-helper
    - go test ./...

build_apks:
  stage: build
  needs:
    - android_unit_tests
    - dnstt_helper_tests
  script:
    - |
      for secret_name in RELEASE_KEYSTORE_BASE64 RELEASE_STORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
        if [ -z "$(printenv "$secret_name")" ]; then
          echo "$secret_name is required for signed release builds." >&2
          exit 1
        fi
      done
      signing_dir="$CI_PROJECT_DIR/.gradle-home/android-signing"
      mkdir -p "$signing_dir"
      export RELEASE_STORE_FILE="$signing_dir/range-scout-release.jks"
      printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RELEASE_STORE_FILE"
    - ./gradlew :app:assembleDebug :app:assembleRelease --stacktrace
    - find app/build/outputs/apk -name "*.apk" -print | sort
    - TAG_NAME="$CI_COMMIT_TAG" bash scripts/prepare-release-apks.sh
    - find app/build/release-assets -name "*.apk" -print | sort
  artifacts:
    name: "range-scout-apks-$CI_COMMIT_TAG"
    paths:
      - app/build/release-assets/*.apk
    expire_in: 14 days
