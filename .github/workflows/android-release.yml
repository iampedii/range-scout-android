name: Android Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Android unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: DNSTT helper tests
        working-directory: dnstt-helper
        run: go test ./...

  build-apks:
    name: Build APKs
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build debug and release APKs
        run: ./gradlew :app:assembleDebug :app:assembleRelease --stacktrace

      - name: List APKs
        run: find app/build/outputs/apk -name "*.apk" -print | sort

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-scanner-apks-${{ github.ref_name }}
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
