name: Android Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Android unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: DNSTT helper tests
        working-directory: dnstt-helper
        run: go test ./...

  build-apks:
    name: Build APKs
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build debug and release APKs
        run: ./gradlew :app:assembleDebug :app:assembleRelease --stacktrace

      - name: List APKs
        run: find app/build/outputs/apk/debug app/build/outputs/apk/release -name "*.apk" -print | sort

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-scanner-apks-${{ github.ref_name }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          shopt -s nullglob
          assets=(app/build/outputs/apk/debug/*.apk app/build/outputs/apk/release/*.apk)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No APK files found for release upload."
            exit 1
          fi

          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --title "Android Scanner $TAG_NAME" --generate-notes
          fi
